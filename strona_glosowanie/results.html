<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Wyniki Konkursu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#e6f7ff,#ffffff);
  margin:0;
  padding:40px;
  text-align:center;
}

h1{
  font-size:40px;
  background:linear-gradient(45deg,#007bff,#00c6ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.results{
  max-width:800px;
  margin:auto;
  margin-top:40px;
}

.result-card{
  background:white;
  border-radius:16px;
  padding:15px;
  margin-bottom:15px;
  display:flex;
  align-items:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
  font-size:20px;
}

.result-card img{
  width:120px;
  height:80px;
  object-fit:cover;
  border-radius:12px;
  margin-right:20px;
  border:2px solid #007bff;
}

.rank-votes{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
}

.rank{
  font-weight:600;
  color:#007bff;
  margin-bottom:5px;
}

.votes{
  font-weight:600;
  color:#333;
}
</style>

</head>
<body>

<h1>Wyniki Konkursu</h1>

<div class="results" id="results"></div>

<script>
fetch("/results_data")
.then(res=>res.json())
.then(data=>{

  const container=document.getElementById("results")

  data.forEach((item,index)=>{

    const div=document.createElement("div")
    div.className="result-card"

    div.innerHTML=`
      <img src="/static/media/image${item.photo_id}.jpg" alt="Zdjęcie ${item.photo_id}" 
           onerror="this.src='https://via.placeholder.com/120x80?text=Brak+zdjęcia'">
      <div class="rank-votes">
        <span class="rank">#${index+1} Zdjęcie ${item.photo_id}</span>
        <span class="votes">${item.votes} głosów</span>
      </div>
    `

    container.appendChild(div)
  })
})
</script>

</body>
</html>
